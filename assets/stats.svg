<svg width="500" height="250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="purpleStats" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#C084FC;stop-opacity:1"/>
    </linearGradient>
    <filter id="statsGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="500" height="250" fill="#0a0014" rx="15"/>
  <rect width="500" height="250" fill="none" stroke="url(#purpleStats)" stroke-width="2" rx="15" opacity="0.3">
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="3s" repeatCount="indefinite"/>
  </rect>
  
  <text x="30" y="50" font-family="monospace" font-size="18" fill="#A78BFA" font-weight="bold">
    DETECTION RATE
  </text>
  
  <text x="30" y="100" font-family="Arial, sans-serif" font-size="64" font-weight="900" 
        fill="url(#purpleStats)" filter="url(#statsGlow)">
    98.7%
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
  </text>
  
  <rect x="30" y="130" width="440" height="12" fill="#1a0033" rx="6"/>
  <rect x="30" y="130" width="0" height="12" fill="url(#purpleStats)" rx="6" filter="url(#statsGlow)">
    <animate attributeName="width" from="0" to="434" dur="2.5s" fill="freeze"/>
  </rect>
  
  <g opacity="0.9">
    <circle cx="40" cy="180" r="4" fill="#8B5CF6">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="55" y="185" font-family="monospace" font-size="16" fill="#A78BFA">
      SNIPERS BLOCKED: 1,247
      <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
    </text>
  </g>
  
  <g opacity="0.9">
    <circle cx="40" cy="215" r="4" fill="#C084FC">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <text x="55" y="220" font-family="monospace" font-size="16" fill="#C084FC">
      TRADERS PROTECTED: 8,932
      <animate attributeName="opacity" values="0.7;1;0.7" dur="3.5s" repeatCount="indefinite"/>
    </text>
  </g>
</svg>
