<svg width="1400" height="600" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="solanaGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9945FF"/>
      <stop offset="100%" style="stop-color:#14F195"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1400" height="600" fill="#000"/>
  
  <image href="./athena.jpg" x="50" y="100" width="450" height="450" opacity="0.9" preserveAspectRatio="xMidYMid slice" clip-path="circle(225px at 225px 225px)">
    <animate attributeName="opacity" values="0.85;0.95;0.85" dur="4s" repeatCount="indefinite"/>
  </image>
  
  <text x="600" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="100" font-weight="900" fill="url(#solanaGradient)" filter="url(#glow)">
    ATHENA
  </text>
  
  <text x="600" y="270" font-family="system-ui" font-size="32" fill="#fff" opacity="0.9">
    AI-Powered Anti-Sniper Market Maker
  </text>
  
  <text x="600" y="330" font-family="system-ui" font-size="20" fill="#14F195" opacity="0.8">
    Built on Solana for sub-second protection
  </text>
  
  <g transform="translate(600, 400)">
    <rect width="700" height="120" fill="#111" rx="10" opacity="0.8"/>
    <text x="20" y="35" font-family="system-ui" font-size="16" fill="#9945FF" font-weight="600">
      REAL-TIME DETECTION
    </text>
    <text x="20" y="60" font-family="system-ui" font-size="14" fill="#fff" opacity="0.7">
      Neural network analyzes every transaction in &lt;100ms
    </text>
    
    <text x="20" y="95" font-family="system-ui" font-size="16" fill="#14F195" font-weight="600">
      ON-CHAIN ENFORCEMENT
    </text>
    <text x="20" y="120" font-family="system-ui" font-size="14" fill="#fff" opacity="0.7">
      Smart contract blocks high-risk wallets automatically
    </text>
  </g>
  
  <circle cx="1300" cy="100" r="60" fill="none" stroke="#9945FF" stroke-width="2" opacity="0.3">
    <animate attributeName="r" values="60;70;60" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1300" cy="500" r="80" fill="none" stroke="#14F195" stroke-width="2" opacity="0.3">
    <animate attributeName="r" values="80;90;80" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>
