<svg width="1200" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="solana" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9945FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#14F195;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D4FF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1200" height="400" fill="#000"/>
  
  <text x="600" y="160" font-family="Arial, sans-serif" font-size="120" font-weight="900" 
        fill="url(#solana)" text-anchor="middle" filter="url(#glow)">
    ATHENA
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
  </text>
  
  <text x="600" y="230" font-family="Arial, sans-serif" font-size="28" 
        fill="#ffffff" opacity="0.8" text-anchor="middle">
    AI-POWERED ANTI-SNIPER AMM FOR SOLANA
  </text>
  
  <g opacity="0.6">
    <circle cx="150" cy="320" r="3" fill="#9945FF">
      <animate attributeName="r" values="3;8;3" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="300" r="3" fill="#14F195">
      <animate attributeName="r" values="3;8;3" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="900" cy="310" r="3" fill="#00D4FF">
      <animate attributeName="r" values="3;8;3" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1050" cy="330" r="3" fill="#9945FF">
      <animate attributeName="r" values="3;8;3" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.8s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <line x1="150" y1="320" x2="300" y2="300" stroke="url(#solana)" stroke-width="1" opacity="0.3">
    <animate attributeName="opacity" values="0.1;0.5;0.1" dur="3s" repeatCount="indefinite"/>
  </line>
  <line x1="300" y1="300" x2="900" y2="310" stroke="url(#solana)" stroke-width="1" opacity="0.3">
    <animate attributeName="opacity" values="0.1;0.5;0.1" dur="3.5s" repeatCount="indefinite"/>
  </line>
  <line x1="900" y1="310" x2="1050" y2="330" stroke="url(#solana)" stroke-width="1" opacity="0.3">
    <animate attributeName="opacity" values="0.1;0.5;0.1" dur="2.8s" repeatCount="indefinite"/>
  </line>
</svg>
