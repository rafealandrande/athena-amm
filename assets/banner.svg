<svg width="1200" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="purple1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1">
        <animate attributeName="stop-color" values="#8B5CF6;#A78BFA;#8B5CF6" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#C084FC;stop-opacity:1">
        <animate attributeName="stop-color" values="#C084FC;#DDD6FE;#C084FC" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#9333EA;stop-opacity:1">
        <animate attributeName="stop-color" values="#9333EA;#A855F7;#9333EA" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    
    <filter id="megaGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <radialGradient id="bgGrad">
      <stop offset="0%" style="stop-color:#1a0033;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1"/>
    </radialGradient>
  </defs>
  
  <rect width="1200" height="500" fill="url(#bgGrad)"/>
  
  <g opacity="0.15">
    <circle cx="200" cy="100" r="150" fill="#8B5CF6">
      <animate attributeName="r" values="150;180;150" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.1;0.2;0.1" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1000" cy="400" r="200" fill="#9333EA">
      <animate attributeName="r" values="200;230;200" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.1;0.2;0.1" dur="10s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <text x="600" y="220" font-family="Arial, sans-serif" font-size="140" font-weight="900" 
        fill="url(#purple1)" text-anchor="middle" filter="url(#megaGlow)">
    ATHENA
    <animateTransform attributeName="transform" type="scale" 
      values="1;1.02;1" dur="3s" repeatCount="indefinite" additive="sum"/>
  </text>
  
  <text x="600" y="290" font-family="Arial, sans-serif" font-size="32" 
        fill="#C084FC" opacity="0.9" text-anchor="middle" letter-spacing="4">
    AI ANTI-SNIPER PROTOCOL
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
  </text>
  
  <g transform="translate(600, 380)">
    <path d="M -80 0 L -40 0" stroke="#8B5CF6" stroke-width="2" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
    </path>
    <circle cx="-60" cy="0" r="4" fill="#8B5CF6">
      <animate attributeName="r" values="3;6;3" dur="2s" repeatCount="indefinite"/>
    </circle>
    
    <path d="M -20 0 L 20 0" stroke="#A78BFA" stroke-width="2" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <circle cx="0" cy="0" r="4" fill="#A78BFA">
      <animate attributeName="r" values="3;6;3" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    
    <path d="M 40 0 L 80 0" stroke="#9333EA" stroke-width="2" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/>
    </path>
    <circle cx="60" cy="0" r="4" fill="#9333EA">
      <animate attributeName="r" values="3;6;3" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
