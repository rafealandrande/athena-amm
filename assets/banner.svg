<svg width="1200" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0088ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1200" height="400" fill="#000"/>
  
  <text x="600" y="150" font-family="Arial, sans-serif" font-size="120" font-weight="900" 
        fill="url(#grad1)" text-anchor="middle" filter="url(#glow)">ATHENA</text>
  
  <text x="600" y="220" font-family="Arial, sans-serif" font-size="32" 
        fill="#ffffff" opacity="0.7" text-anchor="middle">AI-POWERED ANTI-SNIPER AMM</text>
  
  <circle cx="200" cy="300" r="40" fill="none" stroke="#00ff88" stroke-width="2" opacity="0.3"/>
  <circle cx="200" cy="300" r="30" fill="none" stroke="#00ff88" stroke-width="2" opacity="0.5"/>
  <circle cx="200" cy="300" r="20" fill="#00ff88" opacity="0.8"/>
  
  <circle cx="1000" cy="300" r="40" fill="none" stroke="#0088ff" stroke-width="2" opacity="0.3"/>
  <circle cx="1000" cy="300" r="30" fill="none" stroke="#0088ff" stroke-width="2" opacity="0.5"/>
  <circle cx="1000" cy="300" r="20" fill="#0088ff" opacity="0.8"/>
  
  <line x1="240" y1="300" x2="960" y2="300" stroke="url(#grad1)" stroke-width="2" opacity="0.5"/>
</svg>
